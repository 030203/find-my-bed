spring.application.name=booking-system
server.port=${ROOMOS_BACKEND_PORT:8080}

# Database Configuration
spring.datasource.url=${ROOMOS_DB_URL:jdbc:mysql://localhost:3306/booking_system?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ROOMOS_DB_USERNAME:root}
spring.datasource.password=${ROOMOS_DB_PASSWORD:${MYSQL_PASSWORD:456456}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${ROOMOS_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.cache.type=redis
spring.data.redis.host=${ROOMOS_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${ROOMOS_REDIS_PORT:6379}
spring.data.redis.database=${ROOMOS_REDIS_DATABASE:0}
spring.data.redis.password=${ROOMOS_REDIS_PASSWORD:${REDIS_PASSWORD:}}
spring.data.redis.timeout=${ROOMOS_REDIS_TIMEOUT:3s}
spring.data.redis.connect-timeout=${ROOMOS_REDIS_CONNECT_TIMEOUT:3s}
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true

# Cache & distributed lock tuning
roomos.cache.default-ttl=${ROOMOS_CACHE_DEFAULT_TTL:10m}
roomos.cache.featured-property-ttl=${ROOMOS_CACHE_FEATURED_TTL:10m}
roomos.cache.top-property-ttl=${ROOMOS_CACHE_TOP_TTL:5m}
roomos.cache.property-detail-ttl=${ROOMOS_CACHE_DETAIL_TTL:15m}
roomos.redis.lock.wait-time=${ROOMOS_REDIS_LOCK_WAIT_TIME:3s}
roomos.redis.lock.lease-time=${ROOMOS_REDIS_LOCK_LEASE_TIME:10s}

# RabbitMQ Configuration
spring.rabbitmq.host=${ROOMOS_RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${ROOMOS_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${ROOMOS_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${ROOMOS_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}
spring.rabbitmq.virtual-host=${ROOMOS_RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
roomos.mq.booking-auto-cancel-delay=${ROOMOS_BOOKING_AUTO_CANCEL_DELAY:15m}

# Logging
logging.level.root=INFO
logging.level.com.booking.system=${ROOMOS_BACKEND_LOG_LEVEL:DEBUG}

# CORS Configuration
server.servlet.context-path=${ROOMOS_BACKEND_CONTEXT_PATH:/api}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Nacos discovery is opt-in via the nacos profile
spring.cloud.nacos.discovery.enabled=false