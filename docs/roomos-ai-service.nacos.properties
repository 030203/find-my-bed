# Data ID: roomos-ai-service.properties
# Group: DEFAULT_GROUP
# Namespace: public
# Secrets stay in local env or .env:
# - MYSQL_PASSWORD
# - REDIS_PASSWORD
# - DEEPSEEK_API_KEY
# - QWEN_API_KEY

MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_USER=root
MYSQL_DATABASE=booking_system

REDIS_HOST=127.0.0.1
REDIS_PORT=6379
REDIS_DB=0
REDIS_SESSION_PREFIX=roomos:ai:conversation:
REDIS_SESSION_TTL_SECONDS=86400
REDIS_SOCKET_TIMEOUT=5

AI_PROVIDER=deepseek
DEEPSEEK_MODEL=deepseek-chat
DEEPSEEK_BASE_URL=https://api.deepseek.com
QWEN_MODEL=qwen-plus
QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1

TOOL_CALL_MAX_STEPS=6
AI_HISTORY_LIMIT=12
SQL_MAX_ROWS=50
HTTP_TIMEOUT=20
LLM_HTTP_TIMEOUT=45
HTTP_USER_AGENT=RoomOS-AI-Service/1.0

OPEN_METEO_GEOCODING_URL=https://geocoding-api.open-meteo.com/v1/search
OPEN_METEO_FORECAST_URL=https://api.open-meteo.com/v1/forecast
NOMINATIM_SEARCH_URL=https://nominatim.openstreetmap.org/search
