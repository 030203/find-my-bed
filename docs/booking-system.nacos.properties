# Data ID: booking-system.properties
# Group: DEFAULT_GROUP
# Namespace: public
# Secrets stay in env:
# - ROOMOS_DB_PASSWORD
# - ROOMOS_REDIS_PASSWORD / REDIS_PASSWORD
# - ROOMOS_RABBITMQ_PASSWORD / RABBITMQ_PASSWORD

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/booking_system?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3s
spring.data.redis.connect-timeout=3s

roomos.cache.default-ttl=10m
roomos.cache.featured-property-ttl=10m
roomos.cache.top-property-ttl=5m
roomos.cache.property-detail-ttl=15m
roomos.redis.lock.wait-time=3s
roomos.redis.lock.lease-time=10s

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.virtual-host=/
roomos.mq.booking-auto-cancel-delay=15m

logging.level.root=INFO
logging.level.com.booking.system=DEBUG
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always